<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion-Path Swarm</title>
<style>
  :root { color-scheme: dark; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #333333;            /* dark grey page background */
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  /* ---- Background explanation text: white, as large as we can make it ----
     Sized purely in CSS: the smaller of a width- and a height-relative unit,
     so the fixed three-sentence block fills the screen without clipping at any
     resolution (1080p, 4K) or aspect ratio. */
  .explainer {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3vmin;
    color: #ffffff;
    font-weight: 800;
    /* Size the text by viewport AREA (the geometric mean of width and
       height), not by either axis alone. A long paragraph wraps to a
       roughly constant fraction of the screen at any aspect ratio, so it
       fills the view without the top/bottom lines spilling off-screen the
       way a plain min(vw, vh) does. Pure CSS via sqrt(); 1px cancels the
       units so sqrt() operates on a number and the result is a length. */
    font-size: calc(0.072 * 1px * sqrt((100vw / 1px) * (100vh / 1px)));
    line-height: 1.12;
    letter-spacing: -0.01em;
    text-align: center;
    user-select: none;
  }

  /* Force the text to wrap to the full available width so vertical height
     (not single-line width) is what the size maximises against. */
  #explainerText {
    display: block;
    width: 100%;
    text-wrap: balance;
  }

  /* ---- The swarm layer sits on top of the text ---- */
  .swarm {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;          /* never block the page */
  }

  /* Each particle is a tiny SVG that re-uses the inlined logo symbol and
     rides a CSS Motion Path. The path it follows is a real <path> element on
     the page, referenced with offset-path: url(#pN). It auto-rotates to face
     the direction of travel via offset-rotate: auto. */
  .particle {
    position: absolute;
    left: 0;
    top: 0;
    offset-rotate: auto;
    offset-distance: 0%;
    will-change: offset-distance, transform;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    animation-name: orbit, pulse;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }

  @keyframes orbit {
    from { offset-distance: 0%; }
    to   { offset-distance: 100%; }
  }

  /* Gentle, independent breathing scale so the swarm feels alive even
     where paths overlap. */
  @keyframes pulse {
    0%, 100% { transform: scale(0.85); }
    50%      { transform: scale(1.1); }
  }

  /* Per-particle size, opacity, the path it rides, and animation timing.
     Path coordinates are in px laid out for a 1920×1080 frame. */
  .p1{width:119px;height:119px;opacity:0.79;offset-path:url(#p1);animation-duration:32.7s,4.9s;animation-delay:-13.9s,-0.4s;}
  .p2{width:137px;height:137px;opacity:0.58;offset-path:url(#p2);animation-duration:24.4s,4.4s;animation-delay:-10.9s,-0.5s;}
  .p3{width:149px;height:149px;opacity:0.90;offset-path:url(#p3);animation-duration:21.5s,3.5s;animation-delay:-7.7s,-2.7s;}
  .p4{width:116px;height:116px;opacity:0.59;offset-path:url(#p4);animation-duration:23.7s,6.2s;animation-delay:-9.6s,-5.5s;}
  .p5{width:107px;height:107px;opacity:0.72;offset-path:url(#p5);animation-duration:32.7s,5.6s;animation-delay:-28.8s,-3.6s;}
  .p6{width:178px;height:178px;opacity:0.69;offset-path:url(#p6);animation-duration:31.8s,3.7s;animation-delay:-7.2s,-0.3s;}
  .p7{width:128px;height:128px;opacity:0.86;offset-path:url(#p7);animation-duration:22.2s,4.4s;animation-delay:-0.9s,-1.8s;}
  .p8{width:99px;height:99px;opacity:0.74;offset-path:url(#p8);animation-duration:17.3s,3.6s;animation-delay:-3.6s,-5.7s;}
  .p9{width:102px;height:102px;opacity:0.97;offset-path:url(#p9);animation-duration:14.7s,4.2s;animation-delay:-5.5s,-2.7s;}
  .p10{width:131px;height:131px;opacity:0.57;offset-path:url(#p10);animation-duration:19.8s,6.5s;animation-delay:-1.5s,-3.6s;}
  .p11{width:82px;height:82px;opacity:0.55;offset-path:url(#p11);animation-duration:17.2s,4.7s;animation-delay:-1.8s,-1.0s;}
  .p12{width:159px;height:159px;opacity:0.97;offset-path:url(#p12);animation-duration:19.8s,5.3s;animation-delay:-0.6s,-0.5s;}
  .p13{width:119px;height:119px;opacity:0.55;offset-path:url(#p13);animation-duration:32.7s,4.3s;animation-delay:-25.5s,-1.1s;}
  .p14{width:129px;height:129px;opacity:0.75;offset-path:url(#p14);animation-duration:23.6s,4.0s;animation-delay:-23.2s,-4.4s;}
  .p15{width:101px;height:101px;opacity:0.80;offset-path:url(#p15);animation-duration:29.1s,6.3s;animation-delay:-2.8s,-1.6s;}
  .p16{width:85px;height:85px;opacity:0.97;offset-path:url(#p16);animation-duration:31.7s,5.2s;animation-delay:-25.4s,-0.8s;}

  @media (prefers-reduced-motion: reduce) {
    .particle { animation-duration: 0s, 0s !important; }
  }
</style>
</head>
