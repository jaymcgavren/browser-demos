<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion-Path Swarm</title>
<style>
  :root { color-scheme: dark; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #333333;            /* dark grey page background */
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  /* ---- Background explanation text: white, as large as we can make it ---- */
  .explainer {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3vmin;
    color: #ffffff;
    font-weight: 800;
    font-size: 6.2vw;
    line-height: 1.12;
    letter-spacing: -0.01em;
    text-align: center;
    user-select: none;
  }

  /* Force the text to wrap to the full available width so vertical height
     (not single-line width) is what the auto-fit maximises against. */
  #explainerText {
    display: block;
    width: 100%;
    text-wrap: balance;
  }

  /* ---- The swarm layer sits on top of the text ---- */
  .swarm {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;          /* never block the page */
  }

  /* Each particle is a tiny SVG that re-uses the inlined logo symbol and
     rides a CSS Motion Path (offset-path). It auto-rotates to face the
     direction of travel via offset-rotate: auto. */
  .particle {
    position: absolute;
    left: 0;
    top: 0;
    offset-rotate: auto;
    offset-distance: 0%;
    will-change: offset-distance, transform;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    animation-name: orbit;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  @keyframes orbit {
    from { offset-distance: 0%; }
    to   { offset-distance: 100%; }
  }

  /* Gentle, independent breathing scale so the swarm feels alive even
     where paths overlap. */
  @keyframes pulse {
    0%, 100% { transform: scale(0.85); }
    50%      { transform: scale(1.1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .particle { animation-duration: 0s !important; }
  }
</style>

  <p class="explainer"><span id="explainerText">This demo uses the CSS Motion Path feature to fly copies of an SVG
    logo along invisible looping curves. Each particle rides its own offset-path
    and auto-rotates to face the direction it is travelling. The whole swarm is
    driven by pure CSS keyframes, with no JavaScript animation loop.</span></p>

  <div class="swarm" id="swarm" aria-hidden="true"></div>

  <script>
    const swarm = document.getElementById('swarm');
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const XLINK = 'http://www.w3.org/1999/xlink';

    const rand = (min, max) => min + Math.random() * (max - min);

    // Build a smooth, closed loop through jittered points around a center,
    // converting a Catmull-Rom spline into cubic-bezier segments. The returned
    // string is suitable for offset-path: path("...").
    function loopPath(cx, cy, radius) {
      const n = Math.round(rand(5, 8));          // number of lobes
      const pts = [];
      for (let i = 0; i < n; i++) {
        const a = (i / n) * Math.PI * 2;
        const r = radius * rand(0.55, 1.2);
        pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
      const P = i => pts[(i + n) % n];
      let d = `M ${P(0)[0].toFixed(1)} ${P(0)[1].toFixed(1)}`;
      for (let i = 0; i < n; i++) {
        const p0 = P(i - 1), p1 = P(i), p2 = P(i + 1), p3 = P(i + 2);
        const c1x = p1[0] + (p2[0] - p0[0]) / 6;
        const c1y = p1[1] + (p2[1] - p0[1]) / 6;
        const c2x = p2[0] - (p3[0] - p1[0]) / 6;
        const c2y = p2[1] - (p3[1] - p1[1]) / 6;
        d += ` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ` +
             `${c2x.toFixed(1)} ${c2y.toFixed(1)}, ` +
             `${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
      }
      return d + ' Z';
    }

    function makeParticle() {
      const size = rand(80, 180);
      const w = window.innerWidth;
      const h = window.innerHeight;

      // Path coordinates are in px relative to the particle's box origin
      // (which we pin to the top-left of the viewport via left:0; top:0).
      const cx = rand(0.05, 0.95) * w;
      const cy = rand(0.05, 0.95) * h;
      const radius = rand(Math.min(w, h) * 0.12, Math.min(w, h) * 0.4);

      const svg = document.createElementNS(SVG_NS, 'svg');
      svg.setAttribute('class', 'particle');
      svg.setAttribute('viewBox', '0 0 70 70');
      svg.style.width = size + 'px';
      svg.style.height = size + 'px';
      svg.style.offsetPath = `path("${loopPath(cx, cy, radius)}")`;

      const dur = rand(14, 34);
      // Animate the path travel plus an independent breathing pulse.
      svg.style.animationName = 'orbit, pulse';
      svg.style.animationDuration = `${dur}s, ${rand(3, 7).toFixed(1)}s`;
      svg.style.animationTimingFunction = 'linear, ease-in-out';
      svg.style.animationIterationCount = 'infinite, infinite';
      // Spread particles out along their loops with negative delays so the
      // swarm is already in motion on load.
      svg.style.animationDelay = `${(-rand(0, dur)).toFixed(1)}s, ${(-rand(0, 6)).toFixed(1)}s`;
      svg.style.opacity = rand(0.55, 1).toFixed(2);

      const use = document.createElementNS(SVG_NS, 'use');
      use.setAttributeNS(XLINK, 'href', '#logo');
      use.setAttribute('href', '#logo');
      svg.appendChild(use);
      return svg;
    }

    function buildSwarm() {
      swarm.replaceChildren();
      // Scale the count to the viewport area, within reason.
      const count = Math.max(8, Math.min(20,
        Math.round(window.innerWidth * window.innerHeight / 120000)));
      const frag = document.createDocumentFragment();
      for (let i = 0; i < count; i++) frag.appendChild(makeParticle());
      swarm.appendChild(frag);
    }

    // Pick the largest font size at which the full explanation still fits
    // within the viewport (height is the binding constraint). Guarantees no
    // clipping at any resolution, including fullscreen 1080p and 4K.
    const explainer = document.querySelector('.explainer');
    const textEl = document.getElementById('explainerText');
    // Start at a large font and step down until the text fits the viewport.
    function fitText() {
      for (let size = 140; size > 10; size -= 2) {
        explainer.style.fontSize = size + 'px';
        if (explainer.scrollHeight <= window.innerHeight) break;
      }
    }

    fitText();
    buildSwarm();

    // Refit text and rebuild paths on resize so both stay on-screen (debounced).
    let t;
    window.addEventListener('resize', () => {
      clearTimeout(t);
      t = setTimeout(() => { fitText(); buildSwarm(); }, 250);
    });
  </script>
